<!doctype html>
<html lang="en" id="htmlRoot">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="pragram" content="no-cache" />
        <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="expires" content="0" />
        <meta name="referrer" content="no-referrer" />
        <link href="./static/styles/loading.css" rel="stylesheet" type="text/css" />
        <title>系统加载中...</title>
    </head>
    <body>
        <div id="app">
            <div id="loader-wrapper">
                <div id="loader-wrapper-container">
                    <i class="item0"></i>
                    <i class="item0"></i>
                    <i class="item0"></i>
                    <i class="item0"></i>
                </div>
                <div id="loader-wrapper-title">系统加载中...</div>
            </div>
        </div>
        <div id="browser-tip">
            <p>您的浏览器版本过低，请升级浏览器</p>
        </div>
        <script type="module" src="/src/main.js"></script>
        <script type="text/javascript">
            function getBrowserInfo() {
                var Sys = {}
                var ua = navigator.userAgent.toLowerCase()
                var re = /(msie|firefox|chrome|opera|version).*?([\d.]+)/
                var m = ua.match(re)
                Sys.browser = m[1].replace(/version/, "'safari")
                Sys.ver = m[2]

                //谷歌浏览器 49.x以下版本
                if (Sys.browser === 'chrome' && m[2].split('.')[0] * 1 < 49) {
                    var _dom = document.getElementById('browser-tip')
                    _dom.style.display = 'block'
                    var _app = document.getElementById('app')
                    _app.style.display = 'none'
                }
                return Sys
            }

            //获取当前的浏览器信息
            var sys = getBrowserInfo()
            //sys.browser得到浏览器的类型，sys.ver得到浏览器的版本
            // console.log("你的浏览器是：" + sys.browser + " " + sys.ver);
        </script>
    </body>
</html>
